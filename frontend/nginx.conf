server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location = /gateway-health {
        proxy_pass http://api-gateway:8080/actuator/health;
    }

    location = /trip-health {
        proxy_pass http://trip-service:8081/actuator/health;
    }

    location = /recommendation-health {
        proxy_pass http://recommendation-service:8082/actuator/health;
    }

    location = /mcp-health {
        proxy_pass http://mcp-server:8087/actuator/health;
    }

    location /mcp-test/ {
        proxy_pass http://mcp-server:8087/api/mcp-test/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}