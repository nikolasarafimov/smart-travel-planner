spring.application.name=api-gateway
server.port=8080

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=api-gateway
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-url=http://host.docker.internal:8080/actuator/health

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.server.webmvc.routes[0].id=recommendation-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://recommendation-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/recommendations/**

spring.cloud.gateway.server.webmvc.routes[1].id=trip-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://trip-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/trips/**

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8086/realms/smart-travel

spring.cloud.gateway.server.webmvc.routes[2].id=mcp-server
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://mcp-server
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/mcp/**