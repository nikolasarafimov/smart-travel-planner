spring.application.name=mcp-server
server.port=8087

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=mcp-server
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-url=http://host.docker.internal:8087/actuator/health

management.endpoints.web.exposure.include=health,info

spring.ai.mcp.server.name=smart-travel-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=true

smart-travel.gateway-url=http://localhost:8080

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8086/realms/smart-travel

keycloak.token-url=http://localhost:8086/realms/smart-travel/protocol/openid-connect/token
keycloak.client-id=mcp-server-client
keycloak.client-secret=${MCP_CLIENT_SECRET:}