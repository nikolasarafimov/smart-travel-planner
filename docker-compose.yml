services:
  consul:
    image: hashicorp/consul:latest
    container_name: smart-travel-consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    restart: unless-stopped

  recommendation-db:
    image: postgres:16
    container_name: smart-travel-recommendation-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: recommendation_db
      POSTGRES_USER: recommendation_user
      POSTGRES_PASSWORD: recommendation_pass
    volumes:
      - recommendation_data:/var/lib/postgresql/data
    restart: unless-stopped

  trip-db:
    image: postgres:16
    container_name: smart-travel-trip-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: trip_db
      POSTGRES_USER: trip_user
      POSTGRES_PASSWORD: trip_pass
    volumes:
      - trip_data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: smart-travel-kafka
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smart-travel-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smart-travel-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: smart-travel-keycloak
    ports:
      - "8086:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8086
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: smart-travel-recommendation-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY:-}
    depends_on:
      - consul
      - recommendation-db
      - kafka
      - keycloak
    restart: on-failure

  trip-service:
    build:
      context: ./trip-service
      dockerfile: Dockerfile
    container_name: smart-travel-trip-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - consul
      - trip-db
      - kafka
      - keycloak
      - recommendation-service
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: smart-travel-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - consul
      - keycloak
      - recommendation-service
      - trip-service
    restart: on-failure

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: smart-travel-mcp-server
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MCP_CLIENT_SECRET: ${MCP_CLIENT_SECRET:?MCP_CLIENT_SECRET is required}
    depends_on:
      - consul
      - keycloak
      - api-gateway
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-travel-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - keycloak
      - trip-service
      - recommendation-service
      - mcp-server
    restart: unless-stopped

volumes:
  recommendation_data:
  trip_data:
  keycloak_data: